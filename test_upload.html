<!DOCTYPE html>
<html>
<body>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="upload()">Upload</button>
    <script>
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('http://localhost:8000/upload/avatar', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwiZXhwIjoxNzc3NTI4ODgyLCJ1c2VybmFtZSI6Imh1bmdscTciLCJlbWFpbCI6Imh1bmdscTdAZ21haWwuY29tIiwiYXZhdGFyIjoiL2Fzc2V0cy9hdmF0YXIvYXZhdGFyXzIwMjYwNDMwXzA1Mjk0MV80NTg5MDguanBnIiwicm9sZXMiOlsiYWRtaW4iXX0.H5oT1MXUgXBfPqg_7PaU08IoZIfHS4uArEG6zhNpNVQ'
                    },
                    body: formData
                });
                const result = await response.json();
                console.log(result);
                alert('Upload success: ' + JSON.stringify(result));
            } catch (error) {
                console.error(error);
                alert('Upload failed: ' + error.message);
            }
        }
    </script>
</body>
</html>
