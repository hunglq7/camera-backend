services:
  mysql:
    image: mysql:8.0
    container_name: camera_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: LeHung@79
      MYSQL_DATABASE: camera_management
      MYSQL_USER: camera_user
      MYSQL_PASSWORD: camera_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - camera_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: camera_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app/assets:/app/assets
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - PYTHONPATH=/app
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=LeHung@79
      - DB_NAME=camera_management
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - camera_network
    command: python run.py

volumes:
  mysql_data:

networks:
  camera_network:
    driver: bridge
